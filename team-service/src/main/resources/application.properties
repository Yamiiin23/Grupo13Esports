server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/esports_team_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Pro-tip para Spring Boot 4: Forzamos el Dialecto en caso de fallos de metadatos JDBC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

feign.client.game-service.url=http://localhost:8082

feign.client.user-service.url=http://localhost:8081

spring.profiles.active=dev
springdoc.hateoas.enabled=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration