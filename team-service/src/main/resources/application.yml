server:
  port: 8082

spring:
  application:
    name: team-service

  datasource:
    url: jdbc:mysql://localhost:3306/esports_teams_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
    username: root
    password: contraseña
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  tournament-service:
    url: http://localhost:8081

logging:
  level:
    root: INFO
    com.esports.team_service: DEBUG
    org.hibernate.SQL: DEBUG