server:
  port:8081

spring:
  application:
    name: user_service
  datasource:
    url: jdbc:mysql://localhost:3306/esports_user_db?createDatabaseIfNoExist=true&serverTimezone=UTC
    username: root
    password: contraseña
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect