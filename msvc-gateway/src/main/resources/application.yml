spring:
  application:
    name: msvc-gateway
  cloud:
    gateway:
      server:
        webmvc:
          # Cada ruta: si la URL entra por el patron 'predicates', el gateway la reenvia
          # a 'uri'. lb:// significa "busca este nombre en Eureka y balancea la carga".
          routes:
            - id: game-service
              uri: lb://game-service
              predicates:
                - Path=/api/v1/juegos/**,/api/v2/juegos/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/usuarios/**,/api/v2/usuarios/**
            - id: team-service
              uri: lb://team-service
              predicates:
                - Path=/api/v1/equipos/**,/api/v2/equipos/**

            # Rutas para el OpenAPI (JSON) de cada microservicio. El Swagger UI del gateway
            # las consume. Usan el prefijo /api-docs/<svc> (NO /v3/api-docs) para no chocar con
            # el /v3/api-docs propio del gateway. RewritePath lo traduce al /v3/api-docs real del servicio.
            - id: juegos-api-docs
              uri: lb://game-service
              predicates:
                - Path=/api-docs/juegos
              filters:
                - RewritePath=/api-docs/juegos, /v3/api-docs
            - id: usuarios-api-docs
              uri: lb://user-service
              predicates:
                - Path=/api-docs/usuarios
              filters:
                - RewritePath=/api-docs/usuarios, /v3/api-docs
            - id: equipos-api-docs
              uri: lb://team-service
              predicates:
                - Path=/api-docs/equipos
              filters:
                - RewritePath=/api-docs/equipos, /v3/api-docs

# Punto de entrada unico: todo el trafico entra por aqui.
server:
  port: 8080

# El gateway tambien es cliente Eureka para poder resolver los lb://
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Swagger UI agregado: una sola pagina con un desplegable para elegir el microservicio.
springdoc:
  swagger-ui:
    enabled: true
    path: /docs/swagger-ui.html
    # El desplegable apunta a los docs de cada servicio (ruteados por el gateway via lb://).
    urls:
      - name: juegos
        url: /api-docs/juegos
      - name: usuarios
        url: /api-docs/usuarios
      - name: equipos
        url: /api-docs/equipos