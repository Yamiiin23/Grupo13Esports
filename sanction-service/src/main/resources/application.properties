server.port=8089
spring.application.name=sanction-service

spring.datasource.url=jdbc:mysql://localhost:3306/esports_sanction_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

feign.client.team-service.url=localhost:8083
feign.client.user-service.url=localhost:8081

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

